<!DOCTYPE html>

<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil Pro</title>
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Tu CSS -->
    <link rel="stylesheet" href="/public/css/index.css">
</head>

<body>

    <div class="layout">
        <!-- MENU -->
        <div class="menu">
            <div class="perfil">
                <img src="/public/img/fondo.webp">
                <h5 class="mt-3">Mi Perfil</h5>
                <p>Desarrollador 😎</p>
            </div>

            <button onclick="mostrar('perfil')">👤 Perfil</button>
            <button onclick="mostrar('album')">📸 Álbum</button>
            <button onclick="mostrar('contacto')">📞 Contacto</button>
        </div>

        <!-- CONTENIDO -->
        <div class="contenido">

            <!-- PERFIL -->
            <div id="perfil">
                <div class="card-custom">
                    <h4>Bienvenido 👋</h4>
                    <p>Panel moderno y ordenado.</p>
                </div>
            </div>

            <!-- ALBUM -->
            <!-- ALBUM -->

            <div id="album" style="display:none;">
                <div class="card-custom">

                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h4 style="cursor:pointer;" onclick="mostrarTodas()">Álbum</h4>

                        <button class="btn btn-outline-danger btn-sm" onclick="verFavoritos()">
                            ❤️ Favoritos
                        </button>
                    </div>

                    <div class="gallery" id="galeria">
                        <img src="/public/img/img1.jpg">
                        <img src="/public/img/img2.jpg">
                        <img src="/public/img/img3.jpg">
                        <img src="/public/img/img4.jpg">
                        <img src="/public/img/img5.jpg">
                    </div>

                </div>

            </div>



            <!-- CONTACTO -->
            <div id="contacto" style="display:none;">
                <div class="card-custom form-contacto">

                    <h4 class="text-center mb-3">Agregar Contacto</h4>

                    <input type="text" id="nombre" class="form-control mb-3" placeholder="Nombre completo">
                    <input type="text" id="telefono" class="form-control mb-3" placeholder="Teléfono">

                    <button class="btn btn-primary w-100 mb-2" onclick="agregarContacto()">➕ Guardar</button>
                    <button class="btn btn-outline-info w-100" onclick="togglePanel()">👁 Ver contactos</button>

                </div>
            </div>

        </div>
    </div>

    <!-- OVERLAY -->

    <div class="overlay" id="overlay" onclick="cerrarPanel()"></div>

    <!-- PANEL CONTACTOS -->

    <div class="panel-contactos" id="panel">
        <button class="btn btn-sm btn-outline-light mb-2" onclick="cerrarPanel()">⬅ Volver</button>
        <h5>📒 Contactos</h5>
        <ul id="listaContactos" class="list-group mt-3"></ul>
    </div>

    <script src="/public/js/galeria.js"></script>

</body>

</html>
